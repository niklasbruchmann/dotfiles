"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$character"""

right_format = """
$cmd_duration\
"""

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'

[gcloud]
disabled = true
